version: '3.8'

services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mykinguard-mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    restart: unless-stopped

  backend:
    build: .
    container_name: mykinguard-backend
    ports:
      - "3000:3000"
    environment:
      - MQTT_URL=mqtt://mosquitto:1883
      - MQTT_BASE_TOPIC=home/
      - GATEWAY_NAME=OpenMQTTGateway
      - DB_PATH=./data/mykinguard.db
      - ABSENCE_TIMEOUT=60
      - PORT=3000
    depends_on:
      - mosquitto
    volumes:
      - ./data:/app/data
    restart: unless-stopped
